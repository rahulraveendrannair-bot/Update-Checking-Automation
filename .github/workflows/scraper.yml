name: Parallel Scraper Agent

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      workers:
        description: "Max parallel workers"
        required: false
        default: "20"
      filter:
        description: "Only run tasks matching this substring (blank = all)"
        required: false
        default: ""
      dry_run:
        description: "Dry run — scrape but do not write Excel (true/false)"
        required: false
        default: "false"

jobs:
  scrape:
    name: Run scrapers + update Excel
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python ────────────────────────────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      # ── 3. Python dependencies ───────────────────────────────────────────────
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 4. Chrome + ChromeDriver ─────────────────────────────────────────────
      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      # ── 5. Playwright ────────────────────────────────────────────────────────
      - name: Install Playwright browsers
        run: python -m playwright install --with-deps chromium

      # ── 6. Run hash_manager (scrape + update Excel) ──────────────────────────
      - name: Run hash manager
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          WORKERS="${{ github.event.inputs.workers || '20' }}"
          DRY_RUN="${{ github.event.inputs.dry_run || 'false' }}"

          if [ "$DRY_RUN" = "true" ]; then
            python hash_manager.py --workers "$WORKERS" --dry-run
          else
            python hash_manager.py --workers "$WORKERS"
          fi

      # ── 7. Commit updated Excel back to repo ─────────────────────────────────
      - name: Commit updated RPS_Updates.xlsx
        if: ${{ github.event.inputs.dry_run != 'true' && github.event_name != 'pull_request' }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add RPS_Updates.xlsx
          git diff --cached --quiet || git commit -m "chore: update RPS hash values [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push

      # ── 8. Upload artifacts (Excel + logs + backups) ─────────────────────────
      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rps-results-${{ github.run_number }}
          path: |
            RPS_Updates.xlsx
            logs/
            backups/
            reports/
          if-no-files-found: ignore
          retention-days: 90
